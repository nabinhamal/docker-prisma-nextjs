services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: always
    deploy:
      replicas: ${APP_REPLICAS:-1}
    # Remove public ports to force access through Nginx
    # ports:
    #   - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app

  studio:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    depends_on:
      - db

  ws:
    build:
      context: ./ws-service
    restart: always
    environment:
      - PORT=8080
    volumes:
      - ./ws-service:/app
      - /app/node_modules
    depends_on:
      - db

volumes:
  postgres_data:
  nginx_cache:
